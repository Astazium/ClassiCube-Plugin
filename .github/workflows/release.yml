name: Release

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:

  windows-x86:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone ClassiCube
        run: git clone https://github.com/ClassiCube/ClassiCube.git

      - name: Setup MinGW
        run: choco install mingw -y

      - name: Build
        shell: bash
        run: |
          i686-w64-mingw32-gcc \
            -shared -O3 -s \
            -Isrc \
            src/*.c \
            -o SomeTweaksPlugin-win32.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: SomeTweaksPlugin-win32.dll

  windows-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone ClassiCube
        run: git clone https://github.com/ClassiCube/ClassiCube.git

      - name: Setup MinGW
        run: choco install mingw -y

      - name: Build
        shell: bash
        run: |
          x86_64-w64-mingw32-gcc \
            -shared -O3 -s \
            -Isrc \
            src/*.c \
            -o SomeTweaksPlugin-win64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: SomeTweaksPlugin-win64.dll

  linux-x86:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone ClassiCube
        run: git clone https://github.com/ClassiCube/ClassiCube.git

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386

      - name: Build
        run: |
          gcc \
            -m32 \
            -shared -fPIC -O3 -s \
            -Isrc \
            src/*.c \
            -o SomeTweaksPlugin-linux32.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86
          path: SomeTweaksPlugin-linux32.so

  linux-x64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone ClassiCube
        run: git clone https://github.com/ClassiCube/ClassiCube.git

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Build
        run: |
          gcc \
            -m64 \
            -shared -fPIC -O3 -s \
            -Isrc \
            src/*.c \
            -o SomeTweaksPlugin-linux64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: SomeTweaksPlugin-linux64.so
