name: Release

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:

          # Windows 32-bit
          - os: windows-latest
            arch: x86
            compiler: i686-w64-mingw32-gcc
            package: gcc-mingw-w64-i686
            output: SomeTweaksPlugin-win32.dll
            ext: dll

          # Windows 64-bit
          - os: windows-latest
            arch: x64
            compiler: x86_64-w64-mingw32-gcc
            package: gcc-mingw-w64-x86-64
            output: SomeTweaksPlugin-win64.dll
            ext: dll

          # Linux 32-bit
          - os: ubuntu-latest
            arch: x86
            compiler: gcc
            package: gcc-multilib
            cflags: -m32
            output: SomeTweaksPlugin-linux32.so
            ext: so

          # Linux 64-bit
          - os: ubuntu-latest
            arch: x64
            compiler: gcc
            package: gcc
            cflags: -m64
            output: SomeTweaksPlugin-linux64.so
            ext: so

          # macOS 64-bit
          - os: macos-latest
            arch: x64
            compiler: clang
            output: SomeTweaksPlugin-macos64.dylib
            ext: dylib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone ClassiCube
        run: git clone https://github.com/ClassiCube/ClassiCube.git

      - name: Install dependencies
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get -y install ${{ matrix.package }}

            if [ "${{ matrix.arch }}" = "x86" ]; then
              sudo apt-get -y install libc6-dev-i386
            fi
          fi

      - name: Build
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ${{ matrix.compiler }} -shared -O3 -Isrc src/*.c -o ${{ matrix.output }}

          elif [ "${{ runner.os }}" = "Darwin" ]; then
            ${{ matrix.compiler }} -dynamiclib -O3 -Isrc src/*.c -o ${{ matrix.output }}

          else
            ${{ matrix.compiler }} ${{ matrix.cflags }} -shared -fPIC -O3 -Isrc src/*.c -o ${{ matrix.output }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.arch }}
          path: ${{ matrix.output }}
