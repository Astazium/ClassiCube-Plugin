name: Ubuntu Release

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone ClassiCube
      run: | 
        git clone https://github.com/ClassiCube/ClassiCube.git
        ln -s ClassiCube ./Includes

    - name: Build
      run: |
        cd ClassiCube/SomeTweaksPlugin
        make
